name: CI → Build ▶️ Test ▶️ PR

on:
  push:
    branches: [ "issue-*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Docker image
        run: |
          docker build \
            -t qgis-build:latest \
            -f .ci/Dockerfile \
            .

      - name: Run CTest
        run: |
          docker run --rm qgis-build:latest \
            bash -lc "cd /root/QGIS/build && ctest --output-on-failure"

      - name: Upload build logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: /root/QGIS/build/Testing/Temporary/LastTest.log

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image to GHCR
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/qgis-build:${{ github.sha }}
          docker tag qgis-build:latest $IMAGE
          docker push $IMAGE

  create_pr:
    name: Create Pull Request
    needs: build-test
    runs-on: ubuntu-22.04
    if: ${{ success() }}
    environment:
      name: approval

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Pull Request on qgis/QGIS
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.UPSTREAM_TOKEN }}
          branch: ${{ github.ref_name }}
          base: master
          head: ${{ github.actor }}:${{ github.ref_name }}
          title: "[${{ github.ref_name }}] Fix issue"
          body: |
            - Build ✅
            - Tests ✅
            PR ▶️▶️ validation manuelle.
