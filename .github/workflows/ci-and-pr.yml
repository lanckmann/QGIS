# .github/workflows/ci.yml
name: "CI QGIS - Smart Build"

on:
  workflow_dispatch:
  push:
    branches: [master, 'issue-*', 'release-*']
  pull_request:

jobs:
  build-linux-appimage:
    name: Build AppImage (Ubuntu 22.04)
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code with submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install system dependencies
      run: |
        sudo add-apt-repository -y universe
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake ninja-build pkg-config \
          qtbase5-dev qttools5-dev libqt5svg5-dev \
          libqscintilla2-qt5-dev libqca-qt5-2-dev libzip-dev \
          libgdal-dev libproj-dev libgeos++-dev libspatialindex-dev \
          libsqlite3-dev libqt5webkit5-dev libqt5opengl5-dev \
          libexiv2-dev libspatialite-dev libpq-dev \
          libqt5serialport5-dev libqt5sql5-sqlite

    - name: Smart CMake configuration
      run: |
        mkdir -p build && cd build
        CMAKE_ARGS=(
          "-DCMAKE_INSTALL_PREFIX=AppDir/usr"
          "-DWITH_INTERNAL_LIBZIP=ON"  
          "-DUSE_OPENCL=OFF"          
          "-DCMAKE_PREFIX_PATH=/usr/lib/x86_64-linux-gnu/cmake"
          "-DGDAL_CONFIG=/usr/bin/gdal-config"
          "-DPROJ_INCLUDE_DIR=/usr/include/proj"
          "-DCMAKE_FIND_DEBUG_MODE=1"  
        )
        cmake .. -G Ninja "${CMAKE_ARGS[@]}"

    - name: Build and package
      run: |
        cd build
        ninja install
        wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        chmod +x linuxdeploy-x86_64.AppImage
        ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage

    - name: Upload artifact and logs
      uses: actions/upload-artifact@v4
      with:
        name: qgis-appimage
        path: |
          build/*.AppImage
          build/CMake*.log

  build-windows-zip:
    name: Build Windows ZIP
    runs-on: windows-2022
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Clean existing vcpkg
      run: if exist vcpkg rmdir /s /q vcpkg

    - name: Setup vcpkg
      run: |
        git clone https://github.com/microsoft/vcpkg
        cd vcpkg && .\bootstrap-vcpkg.bat
      shell: cmd

    - name: Install dependencies
      run: .\vcpkg\vcpkg install --triplet x64-windows --manifest

    - name: Smart Windows build
      run: |
        mkdir build
        cd build
        cmake .. ^
          -G "Ninja" ^
          -DCMAKE_TOOLCHAIN_FILE="../vcpkg/scripts/buildsystems/vcpkg.cmake" ^
          -DWITH_OPENCL=OFF ^
          -DWITH_3D=OFF ^
          -DENABLE_TESTS=OFF
        ninja
        cpack -G ZIP
      shell: cmd

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: qgis-windows
        path: build/*.zip

  post-build:
    name: Post-Build Analysis
    runs-on: ubuntu-latest
    needs: [build-linux-appimage, build-windows-zip]
    steps:
    - name: Dependency Report
      uses: actions/github-script@v7
      with:
        script: |
          const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
            owner: context.repo.owner,
            repo: context.repo.repo,
            run_id: context.runId,
          });
          artifacts.data.artifacts.forEach(artifact => {
            console.log(`Artifact: ${artifact.name} (${artifact.size} bytes)`);
          });