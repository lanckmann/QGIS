name: CI → Build ▶️ Test ▶️ PR

on:
  push:
    branches:
      - master
      - 'release-**'
      - 'issue-*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # 1. Build & Test on Linux (Ubuntu)
  linux-build:
    name: Build & Test (Linux)
    runs-on: ubuntu-22.04
    steps:
      - name: 🐣 Checkout
        uses: actions/checkout@v4

      - name: 📦 Install deps (+ PDAL + Draco)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake git python3 python3-pyqt5 \
            qtbase5-dev libqt5svg5-dev libqt5serialport5-dev qtwebengine5-dev \
            gdal-bin libgdal-dev proj-bin libproj-dev \
            ccache flex bison pkg-config \
            libzip-dev protobuf-compiler libprotobuf-dev \
            libexiv2-dev libspatialindex-dev libqscintilla2-qt5-dev \
            libpdal-dev pdal libdraco-dev || true

      - name: 💾 Configure CCache (PCH)
        run: ccache --set-config sloppiness=pch_defines,time_macros

      - name: ⚙️ Configure & build QGIS
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DWITH_PDAL=ON \
            -DWITH_DRACO=OFF \
            -DWITH_QTWEBENGINE=ON
          cmake --build . -- -j$(nproc)

      - name: 🔍 Run Tests (CTest)
        run: |
          cd build
          ctest --output-on-failure

      
      - name: 📦 Bundle QGIS (Linux)
        run: |
          cd build
          # “bundle” est la target CPack de QGIS
          cmake --build . --target bundle --config Release

      - name: 📤 Upload Linux bundle
        uses: actions/upload-artifact@v4
        with:
          name: qgis-linux
          path: build/*-linux*.tar.gz   

      - name: 📤 Upload Linux logs si échec
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qgis-linux-logs
          path: |
            build/Testing/Temporary/LastTest.log
            build/CMakeFiles/*.log

  # 2. Build on Windows with Visual Studio + Qt6 + vcpkg
  windows-qt6:
    name: Build (Windows – Qt6)
    runs-on: windows-2022
    steps:
      - name: 🐣 Checkout
        uses: actions/checkout@v4

      - name: 🔨 Uninstall system CMake
        shell: bash
        run: choco uninstall cmake.install -y || true

      - name: 🐩 Install CMake & Ninja
        uses: lukka/get-cmake@v3
        with:
          cmakeVersion: 3.31.6
          installNinja: true

      - name: 🧽 Activate MSVC Dev Cmd
        uses: ilammy/msvc-dev-cmd@v1

      - name: 🎡 Setup vcpkg
        uses: ./.github/actions/setup-vcpkg

      - name: 🦬 Get WinFlexBison
        uses: robinraju/release-downloader@v1.12
        with:
          repository: lexxmark/winflexbison
          fileName: '*.zip'
          tag: v2.5.24
          extract: true

      - name: 🛍️ Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: 1G
          key: build-ccache-win64-qt6-${{ github.ref_name }}
          restore: true
          save: true

      - name: 🛍️ Tune ccache
        shell: bash
        run: ccache --set-config sloppiness=pch_defines,time_macros,include_file_mtime,include_file_ctime

      - name: 🌱 Configure & Build
        shell: bash
        run: |
          BUILD_DIR=$(cygpath "${{ github.workspace }}/build")
          SOURCE_DIR=$(cygpath "${{ github.workspace }}")
          cmake -S "$SOURCE_DIR" -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DWITH_VCPKG=ON \
            -D BUILD_WITH_QT6=ON \
            -D ENABLE_TESTS=OFF \
            -D USE_CCACHE=ON \
            -D FLEX_EXECUTABLE="${SOURCE_DIR}/win_flex.exe" \
            -D BISON_EXECUTABLE="${SOURCE_DIR}/win_bison.exe" \
            -D CMAKE_C_COMPILER_LAUNCHER=ccache \
            -D CMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -D WITH_QTWEBENGINE=OFF \
            -D WITH_DRACO=OFF
          cmake --build "$BUILD_DIR" --config Release

      - name: 📦 Bundle with CPack
        shell: bash
        run: cmake --build "${{ github.workspace }}/build" --config Release --target bundle

      - name: 📤 Upload Windows bundle
        uses: actions/upload-artifact@v4
        with:
          name: qgis-windows-qt6
          path: build/*-win64.zip

  # 3. MinGW64 build inside Fedora container (for portable zip)
  mingw64-build:
    name: Build (MinGW64)
    runs-on: ubuntu-latest
    container:
      image: fedora:40
      options: --security-opt seccomp=unconfined
    steps:
      - name: 🐣 Checkout
        uses: actions/checkout@v4

      - name: 🔄 Update system
        run: |
          dnf -y update
          dnf -y install zip

      - name: 🛠️ Install MinGW deps
        run: ./ms-windows/mingw/mingwdeps.sh

      - name: 🔨 Build QGIS (MinGW)
        run: CCACHE_DIR=$PWD/.ccache ./ms-windows/mingw/build.sh x86_64 nodebug 4

      - name: 🎁 Create Portable zip
        run: |
          DISTROOT=build_mingw64/dist/usr/x86_64-w64-mingw32/sys-root/mingw
          mkdir -p dist_debug
          for file in $(find $DISTROOT -name '*.debug'); do
            mv "$file" dist_debug/
          done
          mv $DISTROOT QGIS-Portable
          zip -r qgis-portable-win64.zip QGIS-Portable
          (cd dist_debug && zip -r qgis-portable-win64-debugsym.zip .)

      - name: 📤 Upload MinGW64 builds
        uses: actions/upload-artifact@v4
        with:
          name: QGIS MinGW64
          path: |
            qgis-portable-win64.zip
            qgis-portable-win64-debugsym.zip


