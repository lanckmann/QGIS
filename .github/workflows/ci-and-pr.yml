name: "CI QGIS - Multiplatform"

on:
  push:
    branches: [master, 'issue-*', 'release-*']
  pull_request:
  workflow_dispatch:

jobs:
  build-linux-appimage:
    name: Build AppImage (Ubuntu 22.04)
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo add-apt-repository -y universe
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake ninja-build pkg-config \
          qtbase5-dev qttools5-dev qttools5-dev-tools \
          libqscintilla2-qt5-dev libqca-qt5-2-dev \
          libgdal-dev libproj-dev libgeos++-dev libspatialindex-dev \
          libsqlite3-dev libqt5svg5-dev libqt5webkit5-dev \
          autoconf automake libtool xz-utils wget \
          libqt5opengl5-dev libqt5serialport5-dev

    - name: Configure build
      run: |
        mkdir build && cd build
        cmake .. \
          -G Ninja \
          -DCMAKE_INSTALL_PREFIX=AppDir/usr \
          -DQT_VERSION_MAJOR=5 \
          -DWITH_QGIS_SERVER=OFF \
          -DWITH_GRASS=OFF

    - name: Build and package
      run: |
        cd build
        ninja install
        wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        chmod +x linuxdeploy-x86_64.AppImage
        ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: qgis-appimage
        path: build/*.AppImage

  build-windows-zip:
    name: Build Windows ZIP
    runs-on: windows-2022
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup vcpkg
      run: |
        git clone https://github.com/Microsoft/vcpkg
        .\vcpkg\bootstrap-vcpkg.bat

    - name: Install dependencies
      run: .\vcpkg\vcpkg install --triplet x64-windows --manifest

    - name: Configure and build
      run: |
        mkdir build
        cd build
        cmake .. `
          -G "Ninja" `
          -DCMAKE_TOOLCHAIN_FILE="../vcpkg/scripts/buildsystems/vcpkg.cmake" `
          -DCMAKE_BUILD_TYPE=Release
        ninja
        cpack -G ZIP

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: qgis-windows
        path: build/*.zip

  error-reports:
    name: Error Reports
    if: ${{ failure() }}
    runs-on: ubuntu-latest
    needs: [build-linux-appimage, build-windows-zip]
    steps:
    - name: Download logs
      uses: actions/download-artifact@v4
      with:
        pattern: '*-logs'
        path: error-logs

    - name: Upload combined logs
      uses: actions/upload-artifact@v4
      with:
        name: full-error-report
        path: error-logs