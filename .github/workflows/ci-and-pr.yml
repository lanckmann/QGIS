name: Linux Build & Test

on:
  push:
    branches:
      - 'issue-*'
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-linux:
    name: Build & Test (Self-Hosted Linux X64)
    runs-on: [ self-hosted, Linux, X64 ]
    env:
      CCACHE_SLOPPINESS: pch_defines,time_macros

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison \
            build-essential \
            ca-certificates \
            ccache \
            cmake \
            cmake-curses-gui \
            dh-python \
            doxygen \
            expect \
            flex \
            flip \
            gdal-bin \
            git \
            graphviz \
            grass-dev \
            libdraco-dev \
            libexiv2-dev \
            libexpat1-dev \
            libfcgi-dev \
            libgdal-dev \
            libgeos-dev \
            libgsl-dev \
            libpdal-dev \
            libpq-dev \
            libproj-dev \
            libprotobuf-dev \
            libqca-qt5-2-dev \
            libqca-qt5-2-plugins \
            libqscintilla2-qt5-dev \
            libqt5opengl5-dev \
            libqt5serialport5-dev \
            libqt5sql5-sqlite \
            libqt5svg5-dev \
            libqt5webkit5-dev \
            libqt5xmlpatterns5-dev \
            libqwt-qt5-dev \
            libspatialindex-dev \
            libspatialite-dev \
            libsqlite3-dev \
            libsqlite3-mod-spatialite \
            libyaml-tiny-perl \
            libzip-dev \
            libzstd-dev \
            lighttpd \
            locales \
            ninja-build \
            ocl-icd-opencl-dev \
            opencl-headers \
            pandoc \
            pdal \
            pkg-config \
            poppler-utils \
            protobuf-compiler \
            pyqt5-dev \
            pyqt5-dev-tools \
            pyqt5.qsci-dev \
            python3-all-dev \
            python3-autopep8 \
            python3-dev \
            python3-gdal \
            python3-jinja2 \
            python3-lxml \
            python3-mock \
            python3-nose2 \
            python3-owslib \
            python3-plotly \
            python3-psycopg2 \
            python3-pygments \
            python3-pyproj \
            python3-pyqt5 \
            python3-pyqt5.qsci \
            python3-pyqt5.qtmultimedia \
            python3-pyqt5.qtpositioning \
            python3-pyqt5.qtserialport \
            python3-pyqt5.qtsql \
            python3-pyqt5.qtsvg \
            python3-pyqt5.qtwebkit \
            python3-pyqtbuild \
            python3-sip \
            python3-termcolor \
            python3-yaml \
            qt3d-assimpsceneimport-plugin \
            qt3d-defaultgeometryloader-plugin \
            qt3d-gltfsceneio-plugin \
            qt3d-scene2d-plugin \
            qt3d5-dev \
            qtbase5-dev \
            qtbase5-private-dev \
            qtkeychain-qt5-dev \
            qtmultimedia5-dev \
            qtpositioning5-dev \
            qttools5-dev \
            qttools5-dev-tools \
            sip-tools \
            spawn-fcgi \
            xauth \
            xfonts-100dpi \
            xfonts-75dpi \
            xfonts-base \
            xfonts-scalable \
            xvfb

      - name: Configure with CMake
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DWITH_GUI=ON \
            -DWITH_SERVER=OFF \
            -DWITH_BINDINGS=ON \
            -DWITH_PYQGIS=ON \
            -DWITH_GRASS=OFF \
            -DWITH_QWTPOLAR=OFF \
            -DWITH_CUSTOM_WIDGETS=OFF \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DPROJ_DIR=/usr \
            -DGDAL_DIR=/usr \
            -DProtobuf_DIR=/usr/lib/x86_64-linux-gnu/cmake/Protobuf

      - name: Build
        run: ninja -C build -j$(nproc)

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qgis-linux-logs
          path: |
            build/Testing/Temporary/LastTest.log
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
