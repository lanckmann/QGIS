name: CI → Build ▶️ Test ▶️ PR

on:
  push:
    branches: [ "issue-*" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # 1. Build & Test (Linux)
  build-test-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux deps (+ PDAL)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake git python3 python3-pyqt5 \
            qtbase5-dev libqt5svg5-dev libqt5serialport5-dev qtwebengine5-dev \
            gdal-bin libgdal-dev proj-bin libproj-dev \
            ccache flex bison pkg-config \
            libzip-dev protobuf-compiler libprotobuf-dev \
            libexiv2-dev libspatialindex-dev libqscintilla2-qt5-dev \
            libpdal-dev pdal

      - name: Configure ccache for PCH
        run: ccache --set-config sloppiness=pch_defines,time_macros

      - name: Configure & build QGIS
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DWITH_QTWEBENGINE=ON \
            -DWITH_PDAL=ON
          make -j$(nproc)

      - name: Run tests (CTest)
        working-directory: build
        run: ctest --output-on-failure

      - name: Upload Linux logs if failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qgis-linux-logs
          path: |
            build/Testing/Temporary/LastTest.log
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log

  # 2. Build & Test (Windows)
  build-test-windows:
    name: Build & Test (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fully update MSYS2
        shell: bash
        run: pacman -Syuu --noconfirm

      - name: Install MSYS2 dependencies
        shell: bash
        run: |
          pacman -S --noconfirm \
            mingw-w64-x86_64-toolchain \
            mingw-w64-x86_64-cmake \
            mingw-w64-x86_64-qt5-base \
            mingw-w64-x86_64-qt5-svg \
            mingw-w64-x86_64-qt5-serialport \
            mingw-w64-x86_64-gdal \
            mingw-w64-x86_64-proj \
            mingw-w64-x86_64-ccache \
            mingw-w64-x86_64-libzip \
            mingw-w64-x86_64-protobuf \
            mingw-w64-x86_64-exiv2 \
            mingw-w64-x86_64-spatialindex \
            mingw-w64-x86_64-flexdll \
            bison \
            mingw-w64-x86_64-qscintilla-qt5

      - name: Add MSYS2 to PATH
        run: echo 'C:\msys64\mingw64\bin' >> $GITHUB_PATH

      - name: Configure & build QGIS
        shell: bash
        run: |
          mkdir -p build && cd build
          cmake .. \
            -G "MSYS Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DWITH_QTWEBENGINE=OFF
          make -j${NUMBER_OF_PROCESSORS}

      - name: Run tests (CTest)
        shell: bash
        run: |
          cd build
          ctest --output-on-failure

      - name: Verify qgis.exe exists
        shell: bash
        run: |
          if [ ! -f build/bin/qgis.exe ]; then
            echo "❌ build/bin/qgis.exe not found!"
            exit 1
          fi

      - name: Upload Windows logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qgis-windows-logs
          path: |
            build/Testing/Temporary/LastTest.log
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log

      - name: Package UI test (Windows)
        if: always()
        shell: pwsh
        run: |
          # Zip the entire build\bin folder so we know qgis.exe is in there
          Compress-Archive -Path build\bin\* -DestinationPath qgis-ui-test-windows.zip

      - name: Upload Windows UI artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qgis-ui-test-windows
          path: qgis-ui-test-windows.zip

  # 3. Build & Test (macOS)
  build-test-macos:
    name: Build & Test (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Homebrew & deps
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" || true
          brew update
          brew install cmake qt@5 gdal proj ccache flex bison libzip protobuf exiv2 spatialindex qscintilla2

      - name: Configure & build QGIS (macOS)
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@5)" \
            -DCMAKE_BUILD_TYPE=Release \
            -DWITH_QTWEBENGINE=ON \
            -DWITH_PDAL=ON
          make -j$(sysctl -n hw.ncpu)

      - name: Run tests (CTest)
        working-directory: build
        run: ctest --output-on-failure

      - name: Upload macOS logs if failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qgis-macos-logs
          path: |
            build/Testing/Temporary/LastTest.log
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log

  # 4. Create Pull Request
  create_pr:
    name: Create Pull Request
    needs: [build-test-linux, build-test-windows, build-test-macos]
    runs-on: ubuntu-22.04
    if: ${{ success() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.UPSTREAM_TOKEN }}
          branch: ${{ github.ref_name }}
          base: main
          head: ${{ github.actor }}:${{ github.ref_name }}
          title: "[${{ github.ref_name }}] Fix issue"
          body: |
            - Build Linux ✅  
            - Build Windows ✅  
            - Build macOS ✅  
            PR ready for manual review.
