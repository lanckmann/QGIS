# .github/workflows/ci.yml
name: "CI → Build ▶️ Test ▶️ PR"

on:
  push:
    branches:
      - master
      - 'issue-*'
      - 'release-*'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-linux-appimage:
    name: Build QGIS AppImage
    runs-on: ubuntu-latest

    steps:
      - name: 🐣 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config \
            qtbase5-dev qtdeclarative5-dev qttools5-dev-tools \
            qscintilla2-qt5-dev libqca-qt5-2-dev \
            libgdal-dev libproj-dev libgeos++-dev libspatialindex-dev \
            libsqlite3-dev libqt5svg5-dev libqt5webkit5-dev \
            autoconf automake libtool xz-utils wget
          # Auto-installer les dépendences Ubuntu pour builder QGIS
          sudo apt-get build-dep -y qgis

      - name: ⚙️ Configure & Install into AppDir
        run: |
          mkdir -p build AppDir/usr
          cd build
          cmake .. \
            -G Ninja \
            -DCMAKE_INSTALL_PREFIX=$(pwd)/../AppDir/usr \
            -DWITH_QGIS_SERVER=OFF \
            -DWITH_GRASS=OFF \
            -DWITH_3D=OFF
          ninja install
          cd ..

      - name: 🚀 Download linuxdeploy
        run: |
          wget -qO linuxdeploy.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy.AppImage

      - name: 📦 Generate AppImage
        run: |
          ./linuxdeploy.AppImage \
            --appdir AppDir \
            --output appimage

      - name: 📤 Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: qgis-linux-appimage
          path: '*.AppImage'
          
  build-windows-zip:
    name: Build QGIS ZIP (Windows)
    runs-on: windows-latest

    steps:
      - name: 🐣 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Install CMake & Ninja
        uses: lukka/get-cmake@v4
        with:
          cmakeVersion: '3.31.6'
          ninjaVersion: 'latest'

      - name: 🧰 Setup vcpkg (manifest mode)
        uses: ./.github/actions/setup-vcpkg

      - name: 📦 Install dependencies via vcpkg
        run: |
          # installe tous les paquets listés dans vcpkg.json pour x64-windows
          vcpkg install --triplet x64-windows --manifest

      - name: 🏗️ Configure & Build
        run: |
          mkdir build
          cd build
          cmake .. \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DWITH_QT6=ON \
            -DENABLE_TESTS=OFF \
            -DCMAKE_INSTALL_PREFIX=$(pwd)/install
          ninja

      - name: 📦 Package with CPack
        run: |
          cd build
          # génère un ZIP Release contenant install/
          cpack -G ZIP -C Release

      - name: 📤 Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: qgis-win64-zip
          path: build/*.zip