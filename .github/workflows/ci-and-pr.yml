name: CI → Build ▶️ Test ▶️ PR

on:
  push:
    branches:
      - master
      - 'release-**'
      - 'issue-*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # 1. Build & Test on Linux (Ubuntu)
 linux-build:
    name: Build & Test (Linux – Conda)
    runs-on: ubuntu-22.04
    steps:
      - name: 🐣 Checkout
        uses: actions/checkout@v4

      - name: 📥 Install Miniconda
        run: |
          wget https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh -O miniconda.sh
          bash miniconda.sh -b -p $HOME/miniconda
          echo "PATH=$HOME/miniconda/bin:$PATH" >> $GITHUB_ENV

      - name: 🌍 Create Conda env with QGIS & deps
        run: |
          conda install -y -c conda-forge mamba
          mamba create -y -n ci-env \
            qgis \
            hdf5 \
            netcdf4 \
            yarn \
            python=3.10
        

      - name: 🚀 Activate Conda env
        run: |
          source $HOME/miniconda/etc/profile.d/conda.sh
          conda activate ci-env

      - name: 💾 Configure CCache (PCH)
        run: ccache --set-config sloppiness=pch_defines,time_macros

      - name: ⚙️ Configure & build QGIS
        run: |
          source $HOME/miniconda/etc/profile.d/conda.sh
          conda activate ci-env
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_WITH_QT6=ON \
            -DWITH_PDAL=ON \
            -DWITH_DRACO=OFF \
            -DWITH_QTWEBENGINE=ON \
            -DWITH_HDF5=ON \
            -DWITH_NETCDF=ON \
            -DWITH_YARN=ON
          cmake --build . -- -j$(nproc)

      - name: 🔍 Run Tests (CTest)
        run: |
          source $HOME/miniconda/etc/profile.d/conda.sh
          conda activate ci-env
          cd build
          ctest --output-on-failure

      - name: 📦 Bundle QGIS (Linux)
        run: |
          source $HOME/miniconda/etc/profile.d/conda.sh
          conda activate ci-env
          cd build
          cmake --build . --target bundle --config Release

      - name: 🖥️ Headless QGIS smoke‑test under Xvfb
        uses: GabrielBB/xvfb-action@v1
        with:
          run: qgis --nologo & sleep 5; pkill qgis
       

      - name: 📸 Capture screenshot of Xvfb buffer
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          DISPLAY=:99 import -window root screenshot.png

      - name: 📤 Upload visual-test screenshot
        uses: actions/upload-artifact@v4
        with:
          name: qgis-visual-test
          path: screenshot.png

      - name: 📤 Upload Linux bundle
        uses: actions/upload-artifact@v4
        with:
          name: qgis-linux
          path: build/*-linux*.tar.gz

      - name: 📤 Upload Linux logs si échec
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qgis-linux-logs
          path: |
            build/Testing/Temporary/LastTest.log
            build/CMakeFiles/*.log

  # 2. Build on Windows with Visual Studio + Qt6 + vcpkg
  windows-qt6:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Uninstall system CMake
        shell: bash
        run: choco uninstall cmake.install -y || true

      - name: Install CMake & Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: 3.31.6
          ninjaVersion: latest

      - name: Activate MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup vcpkg
        uses: ./.github/actions/setup-vcpkg

      - name: Download WinFlexBison
        uses: robinraju/release-downloader@v1.12
        with:
          repository: lexxmark/winflexbison
          fileName: '*.zip'
          tag: v2.5.24
          extract: true

      - name: Configure ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: 1G
          key: build-ccache-win64-qt6-${{ github.ref_name }}
          restore: true
          save: true

      - name: Tune ccache
        shell: bash
        run: ccache --set-config sloppiness=pch_defines,time_macros

      - name: Configure & build
        shell: bash
        run: |
          BUILD_DIR=$(cygpath "${{ github.workspace }}/build")
          SOURCE_DIR=$(cygpath "${{ github.workspace }}")
          cmake -S "$SOURCE_DIR" -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DWITH_VCPKG=ON \
            -DBUILD_WITH_QT6=ON \
            -DENABLE_TESTS=OFF \
            -DUSE_CCACHE=ON \
            -DFLEX_EXECUTABLE="${SOURCE_DIR}/win_flex.exe" \
            -DBISON_EXECUTABLE="${SOURCE_DIR}/win_bison.exe" \
            -D CMAKE_C_COMPILER_LAUNCHER=ccache \
            -D CMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DWITH_QTWEBENGINE=OFF \
            -DWITH_DRACO=OFF
          cmake --build "$BUILD_DIR" --config Release

      - name: Bundle (CPack)
        shell: bash
        run: cmake --build "${{ github.workspace }}/build" --config Release --target bundle

      - name: Upload Windows bundle
        uses: actions/upload-artifact@v4
        with:
          name: qgis-windows-qt6
          path: build/*-win64.zip

      - name: Upload Windows logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qgis-windows-logs
          path: build/CMakeFiles/*log

  # 3. MinGW64 build inside Fedora container (for portable zip)
  mingw64-build:
    name: Build (MinGW64)
    runs-on: ubuntu-latest
    container:
      image: fedora:40
      options: --security-opt seccomp=unconfined
    steps:
      - name: 🐣 Checkout
        uses: actions/checkout@v4

      - name: 🔄 Update system
        run: |
          dnf -y update
          dnf -y install zip

      - name: 🛠️ Install MinGW deps
        run: ./ms-windows/mingw/mingwdeps.sh

      - name: 🔨 Build QGIS (MinGW)
        run: CCACHE_DIR=$PWD/.ccache ./ms-windows/mingw/build.sh x86_64 nodebug 4

      - name: 🎁 Create Portable zip
        run: |
          DISTROOT=build_mingw64/dist/usr/x86_64-w64-mingw32/sys-root/mingw
          mkdir -p dist_debug
          for file in $(find $DISTROOT -name '*.debug'); do
            mv "$file" dist_debug/
          done
          mv $DISTROOT QGIS-Portable
          zip -r qgis-portable-win64.zip QGIS-Portable
          (cd dist_debug && zip -r qgis-portable-win64-debugsym.zip .)

      - name: 📤 Upload MinGW64 builds
        uses: actions/upload-artifact@v4
        with:
          name: QGIS MinGW64
          path: |
            qgis-portable-win64.zip
            qgis-portable-win64-debugsym.zip


