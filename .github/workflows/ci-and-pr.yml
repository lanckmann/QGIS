name: CI → Build ▶️ Test ▶️ PR

on:
  push:
    branches: [ "issue-*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. Build & Test sur Linux (Ubuntu)
  build-test-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Installer les dépendances de build
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake git python3 python3-pyqt5 \
            qtbase5-dev libqt5svg5-dev libqt5serialport5-dev qtwebengine5-dev \
            gdal-bin libgdal-dev proj-bin libproj-dev \
            ccache flex bison pkg-config \
            libzip-dev protobuf-compiler libprotobuf-dev \
            libexiv2-dev libspatialindex-dev libqscintilla2-qt5-dev

      - name: Configurer & Compiler QGIS
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DWITH_QTWEBENGINE=ON
          make -j$(nproc)

      - name: Lancer les tests (CTest)
        working-directory: build
        run: ctest --output-on-failure

      - name: Upload artefacts Linux
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qgis-linux-logs
          path: |
            build/Testing/Temporary/LastTest.log
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log

  # 2. Build & Test sur Windows
  build-test-windows:
    name: Build & Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Setup MSYS2 & dépendances
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-qt5-svg
            mingw-w64-x86_64-qt5-serialport
            mingw-w64-x86_64-qt5-webengine
            mingw-w64-x86_64-gdal
            mingw-w64-x86_64-proj
            mingw-w64-x86_64-ccache
            mingw-w64-x86_64-flex
            mingw-w64-x86_64-bison
            mingw-w64-x86_64-libzip
            mingw-w64-x86_64-protobuf
            mingw-w64-x86_64-exiv2
            mingw-w64-x86_64-spatialindex
            mingw-w64-x86_64-qscintilla2

      - name: Ajouter MSYS2 au PATH
        shell: bash
        run: echo 'C:\msys64\mingw64\bin' >> $GITHUB_PATH

      - name: Configurer & Compiler QGIS Windows
        shell: bash
        run: |
          mkdir -p build && cd build
          cmake .. -G "MSYS Makefiles" -DCMAKE_BUILD_TYPE=Release
          make -j${NUMBER_OF_PROCESSORS}

      - name: Lancer les tests Windows (CTest)
        shell: bash
        run: |
          cd build
          ctest --output-on-failure

      - name: Upload artefacts Windows
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qgis-windows-logs
          path: |
            build/Testing/Temporary/LastTest.log
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log

  # 3. Build & Test sur macOS
  build-test-macos:
    name: Build & Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Installer Homebrew et dépendances
        run: |
          # Installe Homebrew si absent
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" || true
          brew update
          brew install cmake qt@5 gdal proj ccache flex bison libzip protobuf exiv2 spatialindex qscintilla2

      - name: Configurer & Compiler QGIS macOS
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@5)" \
            -DCMAKE_BUILD_TYPE=Release \
            -DWITH_QTWEBENGINE=ON
          make -j$(sysctl -n hw.ncpu)

      - name: Lancer les tests macOS (CTest)
        working-directory: build
        run: ctest --output-on-failure

      - name: Upload artefacts macOS
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qgis-macos-logs
          path: |
            build/Testing/Temporary/LastTest.log
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log

  # 4. Création automatique de la PR
  create_pr:
    name: Create Pull Request
    needs: [build-test-linux, build-test-windows, build-test-macos]
    runs-on: ubuntu-22.04
    if: ${{ success() }}
    environment: approval
    steps:
      - uses: actions/checkout@v4

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.UPSTREAM_TOKEN }}
          branch: ${{ github.ref_name }}
          base: main
          head: ${{ github.actor }}:${{ github.ref_name }}
          title: "[${{ github.ref_name }}] Fix issue"
          body: |
            - Build Linux ✅
            - Build Windows ✅
            - Build macOS ✅
            - Tests Linux ✅
            - Tests Windows ✅
            - Tests macOS ✅
            PR ▶️ Validation manuelle requise.
