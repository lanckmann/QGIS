name: Linux Build & Test

on:
  push:
    branches:
      - 'issue-*'
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-linux:
    name: Build & Test (Self-Hosted Linux X64)
    runs-on: [ self-hosted, Linux, X64 ]
    env:
      CCACHE_SLOPPINESS: pch_defines,time_macros

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare APT for Kitware
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-transport-https ca-certificates

      - name: Add Kitware APT key
        run: |
          curl -fsSL https://apt.kitware.com/keys/kitware-archive-latest.asc \
            | sudo apt-key add -

      - name: Add Kitware APT repository
        run: |
          echo 'deb https://apt.kitware.com/ubuntu/ jammy main' \
            | sudo tee /etc/apt/sources.list.d/kitware.list

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison \
            build-essential \
            ca-certificates \
            ccache \
            cmake \
            ninja-build \
            git \
            python3 \
            python3-pyqt5 \
            python3-pyqt5.qsci \
            qtbase5-dev \
            qttools5-dev-tools \
            libqt5svg5-dev \
            libqt5webkit5-dev \
            libqt5serialport5-dev \
            qtwebengine5-dev \
            gdal-bin \
            libgdal-dev \
            gdal-data \
            proj-bin \
            libproj-dev \
            proj-data \
            flex \
            pkg-config \
            libzip-dev \
            protobuf-compiler \
            libprotobuf-dev \
            libexiv2-dev \
            libspatialindex-dev \
            libqscintilla2-qt5-dev \
            libhdf5-dev \
            libnetcdf-dev \
            libcurl4-openssl-dev \
            ocl-icd-opencl-dev \
            opencl-headers \
            pandoc \
            pdal \
            poppler-utils \
            pyqt5-dev \
            pyqt5-dev-tools \
            pyqt5.qsci-dev \
            python3-all-dev \
            python3-autopep8 \
            python3-dev \
            python3-gdal \
            python3-jinja2 \
            python3-lxml \
            python3-mock \
            python3-nose2 \
            python3-owslib \
            python3-plotly \
            python3-psycopg2 \
            python3-pygments \
            python3-pyproj \
            python3-pyqt5 \
            python3-pyqt5.qsci \
            python3-pyqt5.qtmultimedia \
            python3-pyqt5.qtpositioning \
            python3-pyqt5.qtserialport \
            python3-pyqt5.qtsql \
            python3-pyqt5.qtsvg \
            python3-pyqt5.qtwebkit \
            python3-pyqtbuild \
            python3-sip \
            python3-termcolor \
            python3-yaml \
            qt3d-assimpsceneimport-plugin \
            qt3d-defaultgeometryloader-plugin \
            qt3d-gltfsceneio-plugin \
            qt3d-scene2d-plugin \
            qt3d5-dev \
            qtkeychain-qt5-dev \
            qtmultimedia5-dev \
            qtpositioning5-dev \
            qttools5-dev \
            qttools5-dev-tools \
            sip-tools \
            spawn-fcgi \
            xauth \
            xfonts-100dpi \
            xfonts-75dpi \
            xfonts-base \
            xfonts-scalable \
            xvfb

      - name: Provide ninja-build alias
        run: |
         
          sudo ln -sf "$(which ninja)" /usr/bin/ninja-build

      - name: Setup swapfile (4 G)
        if: runner.os == 'Linux'
        run: |
          
          if ! grep -q '/swapfile' /proc/swaps; then
            echo 'Création et activation du swap…'
            sudo fallocate -l 4G /swapfile
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
          else
            echo 'Swapfile déjà activé, on skip cette étape.'
          fi

      - name: Configure with CMake
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DWITH_GUI=ON \
            -DWITH_SERVER=OFF \
            -DWITH_BINDINGS=ON \
            -DWITH_PYQGIS=ON \
            -DWITH_GRASS=OFF \
            -DWITH_QWTPOLAR=OFF \
            -DWITH_CUSTOM_WIDGETS=OFF \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DPROJ_DIR=/usr \
            -DGDAL_DIR=/usr \
            -DProtobuf_DIR=/usr/lib/x86_64-linux-gnu/cmake/Protobuf

      - name: Build
        run: ninja -C build -j2

      - name: Package build output
        run: |
          cd build/output
          tar czf qgis-linux-debug.tar.gz bin lib

      - continue-on-error: true
        run: |
          cd build
          ctest --output-on-failure || true

      - name: Upload build artefact & logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qgis-linux-debug
          path: |
            build/output/qgis-linux-debug.tar.gz
            build/Testing/Temporary/LastTest.log
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
