name: Linux Build & Test

on:
  push:
    branches:
      - 'issue-*'
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-linux:
    name: Build & Test (Self-Hosted Linux X64)
    runs-on: [ self-hosted, Linux, X64 ]
    env:
      CCACHE_SLOPPINESS: pch_defines,time_macros

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            ccache \
            git \
            python3 \
            python3-pyqt5 \
            python3-pyqt5.qsci \
            qtbase5-dev \
            qttools5-dev-tools \
            libqt5svg5-dev \
            libqt5webkit5-dev \
            libqt5serialport5-dev \
            qtwebengine5-dev \
            gdal-bin \
            libgdal-dev \
            gdal-data \
            proj-bin \
            libproj-dev \
            proj-data \
            flex \
            bison \
            pkg-config \
            libzip-dev \
            protobuf-compiler \
            libprotobuf-dev \
            libexiv2-dev \
            libspatialindex-dev \
            libqscintilla2-qt5-dev \
            libhdf5-dev \
            libnetcdf-dev \
            libcurl4-openssl-dev \
            ocl-icd-opencl-dev \
            opencl-headers

      - name: Configure with CMake
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DWITH_GUI=ON \
            -DWITH_SERVER=OFF \
            -DWITH_BINDINGS=ON \
            -DWITH_PYQGIS=ON \
            -DWITH_GRASS=OFF \
            -DWITH_QWTPOLAR=OFF \
            -DWITH_CUSTOM_WIDGETS=OFF \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DPROJ_DIR=/usr \
            -DGDAL_DIR=/usr \
            -DProtobuf_DIR=/usr/lib/x86_64-linux-gnu/cmake/Protobuf

      - name: Build
        run: ninja -C build -j$(nproc)

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qgis-linux-logs
          path: |
            build/Testing/Temporary/LastTest.log
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
