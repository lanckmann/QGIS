name: CI → Build ▶️ Test ▶️ PR

on:
  push:
    branches:
      - master
      - 'release-**'
      - 'issue-*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-build:
    name: Build & Smoke-test QGIS (APT)
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: 🐣 Checkout
        uses: actions/checkout@v4

      - name: ➕ Ajouter dépôt QGIS.org pour Jammy
        run: |
          wget -qO - https://qgis.org/downloads/qgis-archive-keyring.gpg \
            | sudo tee /usr/share/keyrings/qgis-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/qgis-archive-keyring.gpg] https://qgis.org/ubuntu jammy main" \
            | sudo tee /etc/apt/sources.list.d/qgis.list

      - name: 📦 Installer QGIS + dépendances
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qgis \
            qgis-plugin-grass \
            python3-qgis \
            libhdf5-dev libnetcdf-dev yarn \
            ccache

      - name: 💾 Configurer CCache (PCH)
        run: ccache --set-config sloppiness=pch_defines,time_macros

      - name: ⚙️ Vérifier version QGIS
        run: qgis --version

      - name: 🖥️ Smoke-test QGIS sous Xvfb
        uses: GabrielBB/xvfb-action@v1
        with:
          run: qgis --nologo & sleep 5; pkill qgis

      - name: 📸 Capture screenshot du test headless
        run: |
          sudo apt-get install -y imagemagick
          DISPLAY=:99 import -window root screenshot.png

      - name: 📤 Artifact – screenshot & logs
        uses: actions/upload-artifact@v4
        with:
          name: qgis-linux-artefacts
          path: |
            screenshot.png
            /home/runner/.cache/ccache

  windows-qt6:
    name: Build & Test (Windows)
    runs-on: [self-hosted, windows, x64]
    env:
      VCPKG_CLEAN_AFTER_BUILD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prune old vcpkg buildtrees
        shell: powershell
        run: |
          if (Test-Path C:\.vcpkg\buildtrees) {
            Remove-Item -Recurse -Force C:\.vcpkg\buildtrees
          }

      - name: Uninstall system CMake
        shell: bash
        run: choco uninstall cmake.install -y || true

      - name: Install CMake & Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: 3.31.6
          ninjaVersion: latest

      - name: Activate MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup vcpkg
        uses: ./.github/actions/setup-vcpkg

      - name: Download WinFlexBison
        uses: robinraju/release-downloader@v1.12
        with:
          repository: lexxmark/winflexbison
          fileName: '*.zip'
          tag: v2.5.24
          extract: true

      - name: Configure ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: 1G
          key: build-ccache-win64-qt6-${{ github.ref_name }}
          restore: true
          save: true

      - name: Tune ccache
        shell: bash
        run: ccache --set-config sloppiness=pch_defines,time_macros

      - name: Configure & build
        shell: bash
        run: |
          BUILD_DIR=$(cygpath "${{ github.workspace }}/build")
          SOURCE_DIR=$(cygpath "${{ github.workspace }}")
          cmake -S "$SOURCE_DIR" -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DWITH_VCPKG=ON \
            -DVCPKG_CLEAN_AFTER_BUILD=ON \
            -DBUILD_WITH_QT6=ON \
            -DENABLE_TESTS=OFF \
            -DUSE_CCACHE=ON \
            -DFLEX_EXECUTABLE="${SOURCE_DIR}/win_flex.exe" \
            -DBISON_EXECUTABLE="${SOURCE_DIR}/win_bison.exe" \
            -D CMAKE_C_COMPILER_LAUNCHER=ccache \
            -D CMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DWITH_QTWEBENGINE=OFF \
            -DWITH_DRACO=OFF
          cmake --build "$BUILD_DIR" --config Release

      - name: Bundle (CPack)
        shell: bash
        run: cmake --build "${{ github.workspace }}/build" --config Release --target bundle

      - name: Upload Windows bundle
        uses: actions/upload-artifact@v4
        with:
          name: qgis-windows-qt6
          path: build/*-win64.zip

      - name: Upload Windows logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qgis-windows-logs
          path: build/CMakeFiles/*log

  mingw64-build:
    name: Build (MinGW64)
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: 🐣 Checkout
        uses: actions/checkout@v4

      - name: 🔄 Update system
        run: |
          sudo dnf -y update
          sudo dnf -y install zip

      - name: 🛠️ Install MinGW deps
        run: ./ms-windows/mingw/mingwdeps.sh

      - name: 🔨 Build QGIS (MinGW)
        run: |
          export CCACHE_DIR=$PWD/.ccache
          ./ms-windows/mingw/build.sh x86_64 nodebug 4

      - name: 🎁 Create Portable zip
        run: |
          DISTROOT=build_mingw64/dist/usr/x86_64-w64-mingw32/sys-root/mingw
          mkdir -p dist_debug
          for file in $(find $DISTROOT -name '*.debug'); do
            mv "$file" dist_debug/
          done
          mv $DISTROOT QGIS-Portable
          zip -r qgis-portable-win64.zip QGIS-Portable
          (cd dist_debug && zip -r qgis-portable-win64-debugsym.zip .)

      - name: 📤 Upload MinGW64 builds
        uses: actions/upload-artifact@v4
        with:
          name: QGIS MinGW64
          path: |
            qgis-portable-win64.zip
            qgis-portable-win64-debugsym.zip
